<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aneta Hristova - Web Developer</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik+Wet+Paint&family=Dancing+Script:wght@400..700&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <!-- Decorative glow elements -->
    <div class="glow"></div>
    <div class="glow-2"></div>

    <!-- Navigation -->
    <nav class="navbar">
      <div class="nav-links">
        <a href="#home">Home</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
      </div>

      <div class="social-nav">
        <a
          href="https://github.com/aneta88hristova-png"
          target="_blank"
          rel="noopener noreferrer"
          class="social-icon"
        >
          <img src="./images/github-icon.webp" alt="GitHub" />
        </a>
        <a
          href="https://linkedin.com/in/din-profil"
          target="_blank"
          rel="noopener noreferrer"
          class="social-icon"
        >
          <img src="./images/linkedin-icon.webp" alt="LinkedIn" />
        </a>
      </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero" id="home">
      <div class="hero-container">
        <div class="video-column">
          <video class="hero-video" autoplay loop muted playsinline>
            <source src="./images/aneta.anim.mp4" type="video/mp4" />
          </video>
        </div>

        <div class="content-column">
          <h1>
            Turning Vision Into Reality
            <span class="gradient-text">With Code</span>
          </h1>
          <p class="hero-greeting"></p>
          <p class="profile-bio"></p>
          <div class="button-group">
            <a href="#projects" class="btn btn-primary">Projects</a>
            <a href="#contact" class="btn btn-secondary">Contact</a>
          </div>
        </div>
      </div>
    </section>

    <!-- Projects Section -->
    <section class="projects-section" id="projects">
      <div class="container">
        <header>
          <h1>My GitHub Projects</h1>
          <p>A collection of my web development projects</p>
        </header>

        <div class="projects-grid" id="projects-container">
          <div class="loading">Loading projects...</div>
        </div>
      </div>
    </section>

    <!-- Contact Section -->
    <section class="contact-section" id="contact">
      <div class="container">
        <h2>Let's Work Together</h2>
        <p>Have a project in mind? I'd love to hear about it.</p>

        <div class="contact-info">
          <div class="contact-item">
            <span>📧</span>
            <a href="mailto:" id="contact-email"></a>
          </div>
          <div class="contact-item">
            <span>📱</span>
            <span id="contact-phone"></span>
          </div>
          <div class="contact-item">
            <span>📍</span>
            <span id="contact-location"></span>
          </div>
        </div>

        <form id="contact-form" class="contact-form">
          <div class="form-group">
            <input
              type="text"
              name="name"
              placeholder="Your name"
              required
              minlength="2"
            />
          </div>
          <div class="form-group">
            <input
              type="email"
              name="email"
              placeholder="Your email"
              required
            />
          </div>
          <div class="form-group">
            <textarea
              name="message"
              placeholder="Your message"
              required
              minlength="10"
              rows="5"
            ></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Send message</button>
        </form>
      </div>
    </section>

    <!-- Scripts -->
    <script type="module" src="./js/main.js"></script>

    <!-- Footer -->
    <footer>
      <p>© 2026 Aneta Hristova. All rights reserved.</p>
    </footer>
  </body>
</html>
